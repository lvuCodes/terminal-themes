name: Site CI

# Reusable CI for every lvucodes.github.io site. Consumers invoke it from a
# thin workflow:
#
#   jobs:
#     site-ci:
#       uses: lvuCodes/terminal-themes/.github/workflows/site-ci.yml@main
#
# Expects the repo to define `npm run verify` (the full local gate set) and
# `npm run smoke` (the Playwright iPhone SE suite, building the site first).

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: "22"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run verify

  se-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run smoke
